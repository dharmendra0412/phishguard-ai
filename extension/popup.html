<!DOCTYPE html>
<html>
<head>
    <title>PhishGuard AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <span class="logo">🛡️ PhishGuard AI</span>
    </div>
    <div class="content">
        <div id="status-card" class="status-box safe">
            <h2 id="status-text">Scanning...</h2>
            <p id="confidence-text">Risk Score: 0%</p>
        </div>
        <div class="details">
            <p><strong>URL:</strong> <span id="url-text">-</span></p>
            <p><strong>Reason:</strong> <span id="reason-text">-</span></p>
        </div>
        <div class="footer">
            Real-time protection active
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
