
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhishGuard AI | Real-Time Fraud Detection</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg: #0b0e14;
            --card-bg: rgba(255, 255, 255, 0.05);
            --danger: #ff4d4d;
            --success: #00e676;
            --warning: #ffab00;
            --text: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg);
            background-image: radial-gradient(circle at 10% 20%, rgba(0, 242, 254, 0.05) 0%, transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(79, 172, 254, 0.05) 0%, transparent 40%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        .container {
            max-width: 1000px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        header h1 {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        header p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 2rem;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 242, 254, 0.3);
        }

        .card h2 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        input, textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1rem;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus, textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }

        button {
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            border: none;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: var(--bg);
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        .result {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 12px;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result.show {
            display: block;
        }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .badge-safe { background: rgba(0, 230, 118, 0.2); color: var(--success); }
        .badge-phishing { background: rgba(255, 77, 77, 0.2); color: var(--danger); }
        .badge-suspicious { background: rgba(255, 171, 0, 0.2); color: var(--warning); }

        .score-bar {
            height: 8px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            margin: 1rem 0;
            overflow: hidden;
        }

        .score-fill {
            height: 100%;
            width: 0%;
            transition: width 1s ease-in-out;
        }

        .reason {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
            font-style: italic;
        }

        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>PhishGuard AI</h1>
            <p>Real-Time Cybersecurity & Fraud Detection System</p>
        </header>

        <div class="grid">
            <!-- URL Scanner -->
            <div class="card">
                <h2>🌐 URL Scanner</h2>
                <div class="input-group">
                    <input type="text" id="urlInput" placeholder="Enter URL to scan (e.g. http://login-verify.com)">
                </div>
                <button onclick="scanURL()">Scan URL</button>
                <div id="urlResult" class="result">
                    <div id="urlBadge" class="badge">Safe</div>
                    <div class="score-bar"><div id="urlScoreFill" class="score-fill"></div></div>
                    <p>Risk Score: <span id="urlScoreText">0%</span></p>
                    <p class="reason" id="urlReason"></p>
                </div>
            </div>

            <!-- Message Scanner -->
            <div class="card">
                <h2>✉️ Email & Message Analysis</h2>
                <div class="input-group">
                    <textarea id="msgInput" rows="3" placeholder="Paste SMS or Email content..."></textarea>
                </div>
                <button onclick="scanMessage()">Analyze Content</button>
                <div id="msgResult" class="result">
                    <div id="msgBadge" class="badge">Safe</div>
                    <div class="score-bar"><div id="msgScoreFill" class="score-fill"></div></div>
                    <p>Risk Score: <span id="msgScoreText">0%</span></p>
                    <p class="reason" id="msgReason"></p>
                </div>
            </div>
        </div>

        <div class="card" style="margin-top: 2rem; text-align: center;">
            <h2>🛡️ System Integrity Status</h2>
            <p id="systemStatus">Models: Initializing...</p>
        </div>
    </div>

    <script>
        // Dynamic API Base: Use /api for production (Vercel), otherwise fallback to localhost
        const API_BASE = window.location.hostname === 'localhost' ? "http://localhost:8000" : "/api";

        async function scanURL() {
            const url = document.getElementById('urlInput').value;
            if(!url) return;

            try {
                const res = await fetch(`${API_BASE}/scan-url`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ url })
                });
                const data = await res.json();
                displayResult('url', data);
            } catch (e) {
                console.error(e);
                alert("Backend not reachable. Ensure FastAPI is running.");
            }
        }

        async function scanMessage() {
            const text = document.getElementById('msgInput').value;
            if(!text) return;

            try {
                const res = await fetch(`${API_BASE}/scan-message`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ text })
                });
                const data = await res.json();
                displayResult('msg', data);
            } catch (e) {
                console.error(e);
                alert("Backend not reachable.");
            }
        }

        function displayResult(type, data) {
            const resultDiv = document.getElementById(`${type}Result`);
            const badge = document.getElementById(`${type}Badge`);
            const scoreFill = document.getElementById(`${type}ScoreFill`);
            const scoreText = document.getElementById(`${type}ScoreText`);
            const reason = document.getElementById(`${type}Reason`);

            resultDiv.classList.add('show');
            badge.innerText = data.status;
            badge.className = `badge badge-${data.status}`;
            
            const color = data.status === 'phishing' ? '#ff4d4d' : (data.status === 'suspicious' ? '#ffab00' : '#00e676');
            scoreFill.style.width = `${data.risk_score}%`;
            scoreFill.style.background = color;
            scoreText.innerText = `${data.risk_score}%`;
            reason.innerText = data.reason;
        }

        // Check system status
        async function checkStatus() {
            try {
                const res = await fetch(`${API_BASE}/`);
                const data = await res.json();
                document.getElementById('systemStatus').innerText = `Models: Loaded & Active | System: ${data.status}`;
            } catch (e) {
                document.getElementById('systemStatus').innerText = "Models: Not Loaded (Run training scripts)";
            }
        }
        checkStatus();
    </script>
</body>
</html>
